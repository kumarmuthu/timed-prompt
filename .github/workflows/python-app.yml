# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

# CI workflow for timed-prompt
# Uses the demo script logic to verify import and runs coverage for Codecov

name: timed-prompt CI and Coverage

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: "0 9 1 * *"   # Monthly run (1st day, 9 AM UTC)
  workflow_dispatch:        # Enable manual runs

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade packaging tools
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Install project and coverage
        run: |
          pip install -e .
          pip install coverage

      - name: Run demo sanity test with coverage
        run: |
          echo "
import sys, os
sys.path.insert(0, os.path.abspath(os.path.join(os.path.dirname(__file__), '..')))
from timed_prompt import timed_input_or_getpass

# Quick sanity call to avoid blocking
try:
    timed_input_or_getpass('CI check: ', 0)
except:
    pass

print('timed-prompt import OK')
" > demo_test.py
          coverage run demo_test.py

      - name: Generate coverage report
        run: |
          coverage report
          coverage xml -o coverage.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          flags: timed-prompt
          name: timed-prompt-${{ matrix.python-version }}
